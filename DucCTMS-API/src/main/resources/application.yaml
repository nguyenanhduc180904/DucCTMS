server:
  port: 8080
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:doAnTotNghiep}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:111111}
